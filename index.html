
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabyte 🚀</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
}

/* Navbar */
.navbar {
  background: #000;
}

/* Hero */
.hero {
  text-align: center;
  padding: 80px 20px;
  animation: fadeIn 1.5s ease-in-out;
}

/* Cards */
.card {
  background: #1c1c1c;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

/* Animation */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

a {
  text-decoration: none;
  color: white;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
  <div class="container">
    <span class="navbar-brand">🚀 Parabyte</span>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <h1>Welcome to Parabyte 🚀</h1>
  <p>Code | Projects | Developer Portfolio</p>
</div>

<!-- Cards -->
<div class="container mt-4">
  <div class="row text-center">

    <!-- Python -->
    <div class="col-md-4 mb-3">
      <a href="python.html">
        <div class="card p-4">
          <h3>🐍 Python</h3>
          <p>Learn Python easily</p>
        </div>
      </a>
    </div>

    <!-- C++ -->
    <div class="col-md-4 mb-3">
      <a href="cpp.html">
        <div class="card p-4">
          <h3>⚙️ C++</h3>
          <p>Logic & Programs</p>
        </div>
      </a>
    </div>

    <!-- Projects -->
    <div class="col-md-4 mb-3">
      <a href="projects.html">
        <div class="card p-4">
          <h3>💻 Projects</h3>
          <p>Build real projects</p>
        </div>
      </a>
    </div>

  </div>
</div>

<!-- Footer -->
<div class="text-center mt-5 p-3">
  <p>© 2026 Parabyte | Rohit 💻</p>
</div>

</body>
</html>

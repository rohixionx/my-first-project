
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabyte 🚀</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #00f0ff, #000);
  animation: moveBg 10s infinite linear;
  z-index: -1;
}

@keyframes moveBg {
  0% {transform: translate(0,0);}
  50% {transform: translate(-50px,-50px);}
  100% {transform: translate(0,0);}
}

/* Navbar */
.navbar {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
}

/* Hero */
.hero {
  text-align: center;
  padding: 120px 20px;
  color: white;
  animation: fadeIn 2s ease;
}

.hero h1 {
  font-size: 3rem;
  color: #00f0ff;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  transition: 0.4s;
  backdrop-filter: blur(15px);
  color: white;
}

.card:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #00f0ff;
}

/* Animation */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

a {
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand">🚀 Parabyte</span>
</nav>

<!-- Hero -->
<div class="hero">
  <h1>Future Coding Starts Here ⚡</h1>
  <p>Python | C++ | Projects</p>
</div>

<!-- Cards -->
<div class="container">
  <div class="row text-center">

    <div class="col-md-4 mb-4">
      <a href="python.html">
        <div class="card p-4">
          <h3>🐍 Python</h3>
          <p>Learn futuristic coding</p>
        </div>
      </a>
    </div>

    <div class="col-md-4 mb-4">
      <a href="cpp.html">
        <div class="card p-4">
          <h3>⚙️ C++</h3>
          <p>Build logic & power</p>
        </div>
      </a>
    </div>

    <div class="col-md-4 mb-4">
      <a href="projects.html">
        <div class="card p-4">
          <h3>💻 Projects</h3>
          <p>Create real world ideas</p>
        </div>
      </a>
    </div>

  </div>
</div>

<!-- Footer -->
<div class="text-center text-white mt-5 p-3">
  <p>© 2026 Parabyte | Rohit 🚀</p>
</div>

</body>
</html>

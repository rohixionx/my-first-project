<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit | Royal Developer Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Base Setup & Royal Dark Background */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background: radial-gradient(circle at 50% 40%, #3a1c5e 0%, #150529 60%, #05010d 100%);
            color: #ffffff; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Navigation */
        nav {
            width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; margin-top: 20px; background: rgba(20, 5, 40, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; color: #fcf6ba; text-decoration: none; }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { color: #d4af37; text-decoration: none; font-size: 14px; font-weight: 600; text-transform: uppercase; }

        /* Golden Header */
        header { text-align: center; margin-top: 60px; margin-bottom: 80px; }
        .gold-text {
            font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 800; letter-spacing: 3px; line-height: 1.2;
            background: linear-gradient(to bottom right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text; color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); margin-bottom: 10px;
        }
        header p { color: #c5b3d6; font-size: 1.2rem; font-weight: 300; }

        /* 3D Exhibit Stands */
        .exhibit-hall {
            display: flex; justify-content: center; align-items: flex-end; gap: 50px;
            width: 100%; max-width: 1200px; padding-bottom: 80px; flex-wrap: wrap;
        }

        .pedestal {
            background: linear-gradient(145deg, #1a1a24, #0d0d14); border: 2px solid #2a2a36;
            border-top: 4px solid #b38728; border-radius: 8px; width: 320px; padding: 30px;
            text-align: center; position: relative; box-shadow: 0 30px 50px rgba(0,0,0,0.8);
            transition: transform 0.4s ease;
        }
        .pedestal.center-piece { transform: scale(1.05); z-index: 10; border-top: 4px solid #fcf6ba; }
        .pedestal:hover { transform: translateY(-10px); }

        /* Floating 3D Logos (Auto-Fetched from Web) */
        .floating-object-container {
            position: absolute; top: -140px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 180px; display: flex; justify-content: center; align-items: flex-end;
        }
        .floating-object-container img {
            max-width: 100%; max-height: 100%;
            animation: float3D 4s ease-in-out infinite;
            /* SVG ko 3D glow dene ka magic */
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.8)) drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
        }

        @keyframes float3D {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Stand Text & Buttons */
        .pedestal h3 { font-family: 'Cinzel', serif; font-size: 1.8rem; color: #fcf6ba; margin-top: 60px; margin-bottom: 10px; }
        .pedestal p { color: #a593b8; font-size: 0.95rem; margin-bottom: 25px; }

        .gold-btn {
            background: linear-gradient(to bottom, #fcf6ba, #b38728); border: 2px solid #fff; border-radius: 30px;
            color: #2b1055; font-size: 1rem; font-weight: 700; padding: 12px 30px; text-decoration: none;
            display: inline-block; transition: all 0.3s ease;
        }
        .gold-btn:hover { background: linear-gradient(to bottom, #fff, #fcf6ba); transform: translateY(-3px); }

        @media (max-width: 900px) {
            .exhibit-hall { gap: 120px; padding-top: 100px; }
            .gold-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">♚ Parabyte</a>
        <div class="nav-links">
            <a href="#python">Python</a>
            <a href="#cpp">C++</a>
            <a href="#projects">Projects</a>
        </div>
    </nav>

    <header>
        <h1 class="gold-text">ROHIT'S PORTFOLIO<br>CODE. BUILD. INNOVATE.</h1>
        <p>Explore optimized snippets and innovative performance.</p>
    </header>

    <main class="exhibit-hall">
        
        <div class="pedestal" id="python">
            <div class="floating-object-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" alt="Python Logo">
            </div>
            <h3>Python</h3>
            <p>Advanced Scripts & Automation.</p>
            <a href="#" class="gold-btn">Explore Python</a>
        </div>

        <div class="pedestal center-piece" id="cpp">
            <div class="floating-object-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/18/ISO_C%2B%2B_Logo.svg" alt="C++ Logo">
            </div>
            <h3>C++ Core</h3>
            <p>High-Performance Logic & DSA.</p>
            <a href="#" class="gold-btn">Explore C++</a>
        </div>

        <div class="pedestal" id="projects">
            <div class="floating-object-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Arduino_Logo.svg" alt="Arduino Logo">
            </div>
            <h3>Projects</h3>
            <p>Real-World Hardware + Software.</p>
            <a href="#" class="gold-btn">View Projects</a>
        </div>

    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rohit Portfolio</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    /* Navbar */
    .navbar {
      background: black;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      color: #00f0ff;
      text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff;
    }

    .subtitle {
      color: #aaa;
    }

    /* Headings */
    h2 {
      color: #00f0ff;
      margin-bottom: 20px;
    }

    /* Cards */
    .card {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #00f0ff;
      border-radius: 15px;
      padding: 20px;
      color: #00f0ff;
      font-weight: bold;
      backdrop-filter: blur(10px);
      transition: 0.4s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 25px #00f0ff;
      background: rgba(0, 20, 30, 0.8);
    }

    /* Button */
    .btn-outline-info {
      border-color: #00f0ff;
      color: #00f0ff;
    }

    .btn-outline-info:hover {
      background: #00f0ff;
      color: black;
    }

    /* spacing fix */
    .section {
      margin-top: 60px;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3">
  <span class="navbar-brand">🚀 Rohit</span>
</nav>

<!-- Hero -->
<div class="hero">
  <h1>Hi, I'm Rohit 👋</h1>
  <p class="subtitle">Future Developer 💻</p>
  <button class="btn btn-outline-info mt-3">Download Resume</button>
</div>

<!-- Skills -->
<div class="container text-center section">
  <h2>Skills</h2>
  <div class="row g-3 mt-2">
    <div class="col-4">
      <div class="card">Python</div>
    </div>
    <div class="col-4">
      <div class="card">C++</div>
    </div>
    <div class="col-4">
      <div class="card">Arduino</div>
    </div>
  </div>
</div>

<!-- Projects -->
<div class="container text-center section">
  <h2>Projects</h2>
  <div class="row g-3 mt-2">
    <div class="col-6">
      <div class="card">Project 1</div>
    </div>
    <div class="col-6">
      <div class="card">Project 2</div>
    </div>
  </div>
</div>

</body>
</html>

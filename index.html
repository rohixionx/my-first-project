<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* Navbar */
.navbar {
  background: black;
}

/* Hero */
.hero {
  text-align: center;
  padding: 100 px 20 px;
}

.hero h1 {
  color: #00f0ff;
  text-shadow: 0 0 15 px #00f0ff;
}

.subtitle {
  color: #ccc;
}

/* Cards */
.card {
  background:#111;
  border-radius: 10 px;
  transition: 0.3 s;
}

.card:hover {
  transform: scale (1.05);
  box-shadow: 0 0 15 px #00f0ff;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3">
  <span class="navbar-brand">🚀 Rohit</span>
</nav>

<!-- Hero Section -->
<div class="hero">
  <h1>Hi, I'm Rohit 👋</h1>
  <p class="subtitle">Future Developer 💻</p>
  <button class="btn btn-outline-info mt-3">Download Resume</button>
</div>

<!-- Skills -->
<div class="container text-center mt-5">
  <h2>Skills</h2>
  <div class="row mt-4">
    <div class="col-4">
      <div class="card p-3">Python</div>
    </div>
    <div class="col-4">
      <div class="card p-3">C++</div>
    </div>
    <div class="col-4">
      <div class="card p-3">Arduino</div>
    </div>
  </div>
</div>

<!-- Projects -->
<div class="container text-center mt-5">
  <h2>Projects</h2>
  <div class="row mt-4">
    <div class="col-6">
      <div class="card p-3">Project 1</div>
    </div>
    <div class="col-6">
      <div class="card p-3">Project 2</div>
    </div>
  </div>
</div>

</body>
</html>

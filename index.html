<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0f1f;
  color: white;
}

/* Navbar */
.navbar {
  background: black;
}

/* Hero */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  color: #00f0ff;
  text-shadow: 0 0 20px #00f0ff;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00f0ff;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand">🚀 Rohit</span>
</nav>

<!-- Hero -->
<div class="hero">
  <h1>Hi, I'm Rohit 👋</h1>
  <p>Future Developer 💻</p>
</div>

<!-- Sections -->
<div class="container text-center">

  <h2>Skills</h2>
  <div class="row mt-4">
    <div class="col-4"><div class="card p-3">Python</div></div>
    <div class="col-4"><div class="card p-3">C++</div></div>
    <div class="col-4"><div class="card p-3">Arduino</div></div>
  </div>

  <h2 class="mt-5">Projects</h2>
  <div class="row mt-4">
    <div class="col-6"><div class="card p-3">Project 1</div></div>
    <div class="col-6"><div class="card p-3">Project 2</div></div>
  </div>

</div>

</body>
</html>
